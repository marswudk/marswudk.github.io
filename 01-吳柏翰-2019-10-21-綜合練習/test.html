<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
<style>
    #icon{
        width: 50px;
        height: 50px;
        border-radius: 25px;
        background-color: red;
        position: relative;
        
    }
    #icon::after{
        content: "1";
        position: absolute;
        left: calc(50% - 4px);
        top: calc(50% - 9px);

    }
    #not_icon{
        width: 50px;
        height: 50px;
        border-radius: 25px;
        background-color: red;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
    }
</style>

</head>
<body>
    <div id="icon"></div>
    <div id="not_icon">
        <span>1</span>
    </div>
</body>
</html>
