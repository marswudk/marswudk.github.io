<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>

    .menu{
        width: 100%;
        padding: 20px;
        display: flex;
        justify-content: space-between;
    }
    .set{
        width: 33.33%;
        height: 100%;
    }
    .img{
        width: 100%;
        display: block;
    }
    .content{
        width: 100%;
        display: block;
    }
    .content h1{
        line-height: 20px;
    }
    .content p{
        color: red;
        letter-spacing: 2px;
        
    }
    </style>
</head>
<body>
    <div class="menu">
       
    </div>


    <script>
    
    const big_mac = {
        name: 'BigMac',
        calories: '534kcal',
        protein: '27g',
        fat: '28g',
        carbs: '43g',
        sodium: '780mg',
        img: 'https://www.mcdonalds.com.tw/content/dam/taiwan/site/food_category/20180713evm/evm_1_3.png'
    };
    
    
    const double_cheeseburger = {
        name: 'DoubleCheeseburger',
        calories: '446kcal',
        protein: '27g',
        fat: '25g',
        carbs: '31g',
        sodium: '870mg',
        img: 'https://www.mcdonalds.com.tw/content/dam/taiwan/site/food_category/20180713evm/evm_2_3.png'
    };
   

    const mac_chicken = {
        name: 'MacChicken',
        calories: '356kcal',
        protein: '14g',
        fat: '16g',
        carbs: '41g',
        sodium: '680mg',
        img: 'https://www.mcdonalds.com.tw/content/dam/taiwan/site/food_category/20180713evm/evm_5_3.png'
    };

    const McDonload = [big_mac,double_cheeseburger,mac_chicken];
    const menu = document.querySelector('.menu');
    McDonload.forEach(meal => {
        menu.innerHTML += `
            <div class="menu">
                <div class="set">
                    <div class="img">
                        <img src="${meal.img}" alt="">
                    </div>
                    <div class="content">
                        <h1>${meal.name}</h1>
                        <p>
                            <span class:calories>卡路里:${meal.calories}</span><br />
                            <span class:protein>蛋白質:${meal.protein}</span><br />
                            <span class:fat>脂肪:${meal.fat}</span><br />
                            <span class:carbs>碳水化合物:${meal.carbs}</span><br />
                            <span class:sodium>鈉:${meal.sodium}</span><br />
                        </p>
                    </div>
            </div>`;
        
    });
   

    


    
    
    </script>
</body>
</html>
