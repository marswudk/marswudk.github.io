<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>RWD第一階段任務</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
        }
        #all{
            width: 100%;
            height: 100vh;
        }
        nav{
            width: 200px;
            height: 100vh;
            background-color: darkgray;
            float: left;
        }
        nav #logo{
            width: 120px;
            height: 120px;
            border-radius: 30px;
            background-image:url('avatar.jpg'); 
            background-position: center;
            background-size: cover;
            margin: 100px auto;
            
        }
        nav ul{
            list-style-type: none;
            margin:0;
            padding: 0;
            text-align: center;
            
            
        }
        nav ul li a {
            text-decoration: none;
        }
        main{
            width: calc(100% - 200px);
            height: 100vh;
            background-color: aqua;
            float: left; 
            padding-top:  calc(50vh - 400px);                          
           
        }
         main .outer{
            width: 900px;
            height: 800px;
            background-color: red;
            margin: 0 auto;
            border: 2px solid white;
            
            
        }
        main .outer .left{
            width: 33%;
            height: 100%;
            background-color: orange;
            background-image: url('burger.jpg'); 
            background-position: center;
            background-size: cover;
            float: left;         
            
        }
        main .outer .mid{
            width: 34%;
            height: 100%;
            background-color: yellow;
            background-image: url('bbq.jpg');
            background-position: center;
            background-size: cover;
            float: left;            
           
        }
        main .right{
            width: 33%;
            height: 100%;
            background-color: green;
            background-image: url('chicken.jpg');
            background-position: center;
            background-size: cover;
            float: left;            
            
        } 
        .clearfix{
            clear: both;
        }
        /* 寬螢幕 */
        @media screen and (max-width:1280px){
        
        main{
        width: calc(100% - 200px);
        height: 100vh;
        background-color: aqua;
        float: left; 
        padding-top:  calc(50vh - 225px);
        }
        
        main .outer{
        width: 560px;
        height: 450px;
        background-color: red;
        margin: 0 auto;            
            
        }
        main .outer .left{
            width: 100%;
            height: 50%;
            background-color: orange;
            background-image: url('burger.jpg'); 
            background-position: center;
            background-size: cover;           
        }
        main .outer .mid{
            width: 50%;
            height: 50%;
            background-color: yellow;
            background-image: url('bbq.jpg');
            background-position: center;
            background-size: cover;
            float: left;
        }
        main .right{
            width: 50%;
            height: 50%;
            background-color: green;
            background-image: url('chicken.jpg');
            background-position: center;
            background-size: cover;
            float: left;
        } 
        }
        /* 窄螢幕 */
        @media screen and (max-width: 768px){
            
        nav{
            width: 100vw;
            height: 100px;
            background-color: darkgray;
            padding: 20px;
            
        }
        nav #logo{
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background-image: url('avatar.jpg'); 
            background-position: center;
            background-size: cover;
            float: left;
            margin: 0;
                        
        }
        nav ul{
            list-style-type: none;
            margin-top:20px;
            padding: 0px;           
            float: right;                        
            
        }
        nav ul li{
            float: left;
            margin-right: 30px;
        }
        nav ul li a {
            text-decoration: none;
                    
        }
        main{
            width:100vw;
            height: calc(100vh - 50px);
            background-color: aqua;            
            padding-top:  calc(50vh - 375px);                          
           
        }
         main .outer{
            width: 90%;
            height: 700px;
            background-color: red;
            margin: 0 auto;
            
            
        }
        main .outer .left{
            width: 100%;
            height: 50%;
            background-color: orange;
            background-image: url('burger.jpg'); 
            background-position: center;
            background-size: cover;
            
        }
        main .outer .mid{
            width: 50%;
            height: 50%;
            background-color: yellow;
            background-image: url('bbq.jpg');
            background-position: center;
            background-size: cover;
            float: left;
        }
        main .right{
            width: 50%;
            height: 50%;
            background-color: green;
            background-image: url('chicken.jpg');
            background-position: center;
            background-size: cover;
            float: left;
        } 
        }
        /* 平板 */
        @media screen and (max-width: 375px){
        
        nav{
        width: 100vw;
        height: 80px;
        background-color: darkgray;
        
            
        }
        nav #logo{
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background-image: url('avatar.jpg'); 
            background-position: center;
            background-size: cover;            
            float: right;
            margin-right: calc(50vw - 50px);
            
                                   
        }
        nav .list{
            width: 50px;
            height: 50px;
            background-color: black;
            float: left;
        }
        nav ul{
            list-style-type: none;
            margin-top:20px;
            padding: 0px;           
            float: right;
            display: none;                        
            
        }
        nav ul li{
            float: left;
            margin-right: 30px;
        }
        nav ul li a {
            text-decoration: none;
                    
        }
        main{
            width:100vw;
            height: calc(100vh - 40px);
            background-color: aqua;            
            padding: 0;                          
           
        }
         main .outer{
            width: 100%;
            height: 100%;
            background-color: red;
            margin: 0 auto;
            
            
        }
        main .outer .left{
            width: 100%;
            height: 33%;
            background-color: orange;
            background-image: url('burger.jpg'); 
            background-position: center;
            background-size: cover;
            float: left;
            
        }
        main .outer .mid{
            width: 100%;
            height: 34%;
            background-color: yellow;
            background-image: url('bbq.jpg');
            background-position: center;
            background-size: cover;
            float: left;
        }
        main .right{
            width: 100%;
            height: 33%;
            background-color: green;
            background-image: url('chicken.jpg');
            background-position: center;
            background-size: cover;
            float: left;
        } 
        }

        
    </style>
</head>

<body>
    <div id="all">
        <nav>
            <div id="logo"></div>
            <div class="list">
                <ul>
                    <li>
                        <a href="">XXX</a>
                    </li>
                    <li>
                        <a href="">YYY</a>
                    </li>
                    <li>
                        <a href="">ZZZ</a>
                    </li>
                </ul>
            </div>
            
        </nav>

        <main>
            <div class="outer">
                <div class="left"></div>
                <div class="mid"></div>
                <div class="right"></div>
                <div class="clearfix"></div>
            </div>
        </main>
        <div class="clearfix"></div>
    </div>
    

</body>

</html>
