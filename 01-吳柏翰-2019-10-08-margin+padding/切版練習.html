<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>切版練習</title>

    <style>
        *{
            box-sizing: border-box;
        }
        body{margin: 0;
        }
    .all{
        width: 70%;
        height: 800px;
        background-color: black;
        margin: 0 auto;
        padding: 10px;
    }
    .header{
        width: 100%;
        height: calc(25% - 10px);
        background-color: red;
    }
    .main{
        width: 100%;
        height: 45%;
        background-color: orange;
        margin: 10px 0;
    }
    .footer{
        width: 100%;
        height: calc(30% - 10px);
        background-color: yellow;
    }
    .main-L{
        width: 30%;
        height: 100%;
        background-color: green;
        float: left;
        margin: 0 10px 0 0;
    }
    .main-R{
        width: calc(70% - 10px);
        height: 100%;
        background-color: skyblue;
        float: left;        
    }
    .top{
        width: 100%;
        height: 30%;
        background-color: violet;        
    }
    .mid{
        width: 100%;
        height: calc(40% - 20px);
        background-color: crimson;
        margin: 10px 0;     
    }
    .btm{
        width: 100%;
        height: 30%;
        background-color: dimgray;
    }
    </style>
</head>
<body>
    <div class="all">
        <div class="header"></div>
        <div class="main">
            <div class="main-L"></div>
            <div class="main-R">
                <div class="top"></div>
                <div class="mid"></div>
                <div class="btm"></div>
            </div>
        </div>
        <div class="footer"></div>
    </div>


</body>
</html>
