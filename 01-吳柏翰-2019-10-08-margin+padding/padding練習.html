<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
    *{box-sizing: border-box
    }
    
    .box1{
        width: 20vw;
        height: 20vw;
        background-color: red;
        padding: 25px;
        float: right;
        
    }
    .box2{
        width: 20vw;
        height: 20vw;
        background-color: yellow;
        padding-right: 25px;
        float: left;
        text-align: right;
    }
    .box3{width: 20vw;
        height: 20vw;
        background-color: green;
        padding: 10px 90px;
        clear: both;
        
    }
    .box4{
        width: 20vw;
        height: 20vw;
        background-color: brown;
        padding: 10px 10px 0 15px;
        float: right;
    }

    
    
    
    </style>
</head>
<body>
    <div class="box1">Read</div>
    <div class="box2">Read</div>
    <div class="box3">Read</div>
    <div class="box4">Read</div>






</body>
</html>
