<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
    body{margin: 0;}
    .w-200{
        width: 200px;
    }
    .h-200{
        height: 200px;
    }    
    .box1{
        background-color: red;
        margin: 25px;
        
    }
    .box2{
        background-color: green;
        margin: 0 10px;
    }
    .box3{
        background-color: yellow;
        margin-top: 30px;
    }
    .box4{
        background-color: aqua;
        margin: -40px 10px 20px 10px;
    }
    .box5{
        background-color: purple;
        margin: 20px;
    }
    .box6{
        background-color: coral;
        
    }
    .box7{
        width: 50px;
        height: 50px;
        background-color: darkgray;
        margin:calc(50% - 25px);
    }
    
    </style>
</head>
<body>
    
    <div class="box1 w-200 h-200"></div>
    <div class="box2 w-200 h-200"></div>
    <div class="box3 w-200 h-200"></div>
    <div class="box4 w-200 h-200"></div>
    <div class="box5 w-200 h-200"></div>
    <div class="box6 w-200 h-200">
        <div class="box7"></div>
    </div>
</body>
</html>
