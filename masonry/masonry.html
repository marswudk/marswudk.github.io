<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
    * { box-sizing: border-box; }

body { font-family: sans-serif; }

/* ---- grid ---- */

.grid {
  background: #EEE;
  max-width: 1200px;
}

/* clearfix */
.grid:after {
  content: '';
  display: block;
  clear: both;
}

/* ---- grid-item ---- */

.grid-item {
  width: 160px;
  height: 120px;
  float: left;
  background: #D26;
  border: 2px solid #333;
  border-color: hsla(0, 0%, 0%, 0.5);
  border-radius: 5px;
}

/* .grid-item--width2 { width: 320px; }
.grid-item--width3 { width: 480px; }
.grid-item--width4 { width: 640px; }

.grid-item--height2 { height: 200px; }
/* .grid-item--height3 { height: 260px; } */
.grid-item--height4 { height: 360px; } 
</style>
</head>
<body>
    <h1>Masonry - columnWidth</h1>

<div class="grid">
  <div class="grid-item">00</div>
  <div class="grid-item">01</div>
  <div class="grid-item">02</div>
  <div class="grid-item">03</div>
  <div class="grid-item">04</div>
  <div class="grid-item">05</div> 
  <div class="grid-item grid-item--height4">06</div>
  <div class="grid-item grid-item--height4">07</div>
  <div class="grid-item grid-item--height4">08</div>
  <div class="grid-item grid-item--height4">09</div>
  <div class="grid-item grid-item--height4">10</div>
  <div class="grid-item grid-item--height4">11</div>
  
  
</div>


<script>
$('.grid').masonry({
  itemSelector: '.grid-item',
  columnWidth: 160
});


</script>
</body>
</html>
