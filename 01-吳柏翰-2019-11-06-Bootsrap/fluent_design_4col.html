<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        .all{
            overflow: hidden;
        }
            
        
        .row {
            position: relative;
        }

        .row::before {
            content: "";
            display: block;
            position: absolute;
            left: -50%;
            top: 0;
            width: 50%;
            height: 100%;
            background-color: rgb(34, 128, 200);
        }

        .row::after {
            content: "";
            display: block;
            position: absolute;
            right: -50%;
            top: 0;
            width: 50%;
            height: 100%;
            background-color: rgb(95, 207, 99);
        }


        .col-xl-3 a {
            color: black;
            text-decoration: none;
            display: block;
            padding: 27px;
        }

        .col-xl-3:nth-child(1) {
            background-color: rgb(37, 142, 222);
        }

        .col-xl-3:nth-child(1):hover {
            background-color: rgb(20, 130, 200);
        }

        .col-xl-3:nth-child(2) {
            background-color: rgb(79, 229, 255);
        }

        .col-xl-3:nth-child(2):hover {
            background-color: rgb(60, 200, 220);
        }


        .col-xl-3:nth-child(3) {
            background-color: rgb(207, 143, 255);
        }

        .col-xl-3:nth-child(3):hover {
            background-color: rgb(198, 135, 220);
        }

        .col-xl-3:nth-child(4) {
            background-color: rgb(105, 229, 110);
        }

        .col-xl-3:nth-child(4):hover {
            background-color: rgb(80, 200, 90);
        }

        .img {
            margin: 0 0 75px 0;
        }

        .col-xl-3 h2 {
            line-height: 36px;
            margin-bottom: 36px;
        }

        .col-xl-3 p {

            margin-bottom: 92px;
        }

        .arrow {
            margin: 0 16px 0 0;
        }

        @media(max-width: 1200px) {
            .container {
                max-width: 100%;
                padding: 0;
            }

            .row::before {
                display: none;
            }

            .row::after {
                display: none;
            }

            .col-xl-3 a {

                padding: 38px;
            }

            .img {
                margin: 0 0 70px 0;
            }

            .col-xl-3 h2 {

                margin-bottom: 45px;
            }

            .col-xl-3 p {

                margin-bottom: 25px;
            }



        }
    </style>

</head>

<body>
    <section class="all">
        <div class="container">
            <div class="row no-gutters">
                <div class=" col-xl-3 col-md-6 col-12">
                    <a href="" data-aos="zoom-in-up" data-aos-duration="1500">
                        <div class="img">
                            <img src="/imgs/icon-globe.svg" alt="">
                        </div>
                        <div>
                            <h2>Web</h2>
                            <p>Create your own web apps and add-ins.</p>
                        </div>
                        <div>
                            <span><img class="arrow" src="/imgs/arrow-black.svg" alt=""></span><span>Get started!</span>
                        </div>

                    </a>
                </div>
                <div class=" col-xl-3 col-md-6 col-12">
                    <a href="" data-aos="zoom-in-up" data-aos-duration="1500">
                        <div class="img"><img src="/imgs/icon-windows.svg" alt=""></div>
                        <div>
                            <h2>Windows</h2>
                            <p>Create and publish your own Windows apps.</p>
                        </div>
                        <div>
                            <span><img class="arrow" src="/imgs/arrow-black.svg" alt=""></span><span>Get started!</span>
                        </div>
                    </a>
                </div>
                <div class=" col-xl-3 col-md-6 col-12">
                    <a href="" data-aos="zoom-in-up" data-aos-duration="1500">
                        <div class="img">
                            <img src="/imgs/icon-ios.svg" alt="">
                        </div>
                        <div>
                            <h2>iOS</h2>
                            <p>Take your custom apps to the mobile market.</p>
                        </div>
                        <div>
                            <span><img class="arrow" src="/imgs/arrow-black.svg" alt=""></span><span>Get started!</span>
                        </div>
                    </a>
                </div>
                <div class=" col-xl-3 col-md-6 col-12">
                    <a href="" data-aos="zoom-in-up" data-aos-duration="1500">
                        <div class="img">
                            <img src="/imgs/icon-android.svg" alt="">
                        </div>
                        <div>
                            <h2>Android</h2>
                            <p>Take your custom apps to the mobile market.</p>
                        </div>
                        <div>
                            <span><img class="arrow" src="/imgs/arrow-black.svg" alt=""></span><span>Get started!</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </section>
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <!-- AOS innitial -->
    <script>
        AOS.init();
    </script>

    <script>
    
    
    </script>
</body>

</html>
