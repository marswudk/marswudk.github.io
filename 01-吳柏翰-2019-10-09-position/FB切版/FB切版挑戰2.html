<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
    *{
        box-sizing: border-box;
    }
    body{
        margin: 0;
    }
    #bluebarRoot{
        width: 100%;
        height: 43px;
        margin-top: 0;
        background-color: blue;
        padding: 7px 0 5px 100px;
        position: relative; 
            
    }
    #fb_icon{
        height: 30px;
        float: left;
        margin-right: 5px;

    }
    #searching_bar{
        width: 200px;
        height: 30px;
        float: left;
    }
    #magnifier{
        height: 30px;
        float: left;
        background-color: white;
    }

    #header{
        width: 70%;
        height: 356px;
        background-color: black;
        margin: 0 auto;
        position: relative;

    }
    #coverBorder_pic{
        width: 100%;
        height: 313px;
        background-color: red;
        background-image: url('picture/waterfall.jpg');
        background-position: bottom;
        background-repeat: no-repeat;
        background-size: cover;
        position: relative;
    }
    #functionmenuLeft{
        width: 150px;
        height: 30px;
        background-color: white;
        position: absolute;
        right: 260px;
        bottom: 40px;
        float: left;
    }
    #functionmenuRight{
        width: 150px;
        height: 30px;
        background-color: white;
        position: absolute;
        right: 60px;
        bottom: 40px;
        float: left;
    }
    #avatar{
        width: 160px;
        height: 160px;
        border-radius: 80px;
        background-color: white;
        position: absolute;
        bottom: 30px;
        left: 40px;
        background-image: url('picture/avatar.png');
        background-size: cover;
        background-position: center;
        border: 2px solid green;        
        z-index: 1;
    }
    #coverBorder_headline{
        width: 100%;
        height: 43px;
        background-color: white;
        position: relative;
        padding: 1px 0px 1px 250px;
        border: thin solid lightgray;
       
    }
    #timeline{
        width: 100px;
        height: 40px;
        background-color: white;
        text-align: center;
        border-left: thin solid lightgray;
        border-right: thin solid lightgray;
        float: left;
        padding: 8px;       

    }
    #about{
        width: 100px;
        height: 40px;
        background-color: white;
        text-align: center;
        border-right: thin solid lightgray;
        float: left;
        padding: 8px;       

    }
    #friends{
        width: 100px;
        height: 40px;
        background-color: white;
        text-align: center;
        border-right: thin solid lightgray;
        float: left;
        padding: 8px;       

    }
    #photos{
        width: 100px;
        height: 40px;
        background-color: white;
        text-align: center;
        border-right: thin solid lightgray;
        float: left;
        padding: 8px;       

    }
    #archive{
        width: 100px;
        height: 40px;
        background-color: white;
        text-align: center;
        border-right: thin solid lightgray;
        float: left;
        padding: 8px;       

    }
    #more{
        width: 100px;
        height: 40px;
        background-color: white;
        text-align: center;
        border-right: thin solid lightgray;
        float: left;
        padding: 8px;       

    }



   


    
    </style>
</head>
<body>
    <div id="bluebarRoot">
        <img id="fb_icon" src="picture/FB-Icon.png" alt="fb_icon">
        <input type="text" name="" id="searching_bar"  placeholder="搜尋">
        <img id="magnifier" src="picture/magnifier.png" alt="magnifier">
        <div id="homepage"></div>
        <div id="create"></div>
        <img id="friendsRequest" src="" alt="">
        <img id="messages" src="" alt="">
        <img id="notification" src="" alt="">
        <img id="quickHelp" src="" alt="">
                                                          
    </div>
    <!-- bluebarRoot(置頂藍條) -->
    
    <div id="header">
        <div id="coverBorder_pic">
            <div id="functionmenuLeft"></div>
            <div id="functionmenuRight"></div>
        </div>
        <!-- 封面照片 -->
        <div id="avatar"></div>
        <!-- 大頭照 -->
        <div id="coverBorder_headline">
            <div id="timeline">動態時報</div>
            <div id="about">關於</div>
            <div id="friends">朋友</div>
            <div id="photos">相片</div>
            <div id="archive">典藏</div>
            <div id="more">更多</div>
            <!-- 動態時報列 -->
        </div>
    </div>
    
</body>
</html>
