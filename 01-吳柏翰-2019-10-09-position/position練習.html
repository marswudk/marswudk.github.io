<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
    *{
        box-sizing: border-box;
    }
    .w-200{
        width: 200px;
    }
    .h-200{
        height: 200px;
    }
    .w-50{
        width: 50px;
    }
    .h-50{
        height: 50px;
    }
    .absolute{
        background-color: black;
        position: absolute;
        top: calc(50% - 25px);
        left: calc(50% - 25px)
    }
    .relative{
        background-color: red;
        position: relative;
        top: 50px;
        left: 50px;
        width: 40%;
        height: 200px;
    }
    .static{
        background-color: orange;
        position: static;
        
    }
    .absolute2{
        background-color: green;
        position: absolute;
        bottom: 59px;
        left: 40px;
    }
    .fixed{
        background-color: aqua;
        position: fixed;
        bottom: 5px;
        right: 5px;
    }

    </style>
</head>
<body>
    <div class="absolute2 h-50 w-50"></div>
    <div class="fixed h-50 w-50"></div>
    <div class="static h-200 w-200"></div>
    <div class="relative ">
        <div class="absolute h-50 w-50"></div>
    </div>
</body>
</html>
