<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>

    <style>
    *{
        box-sizing: border-box;
    }
    .w-500{
        width: 500px;
    }
    .h-300{
        height: 300px;
    }
    .w-h-50{
        width: 50px;
        height: 50px;
    }
    .A{
        background-color: black;
        position: relative;
        top: 10px;
        left: 20px;
        float: left;
        margin-right: 5px;
         
    }
    .a{
        background-color:red;
        position: absolute;
        top: calc(50% - 25px);
        left: calc(50% - 25px);
    }
    .C{
        background-color: chartreuse;
        position: relative;
        top: 10px;
        left: 20px;
        float: left;
        margin-right: 5px;
              
    }
    .c{
        background-color: red;
        position: absolute;
        top: 0;
        left: calc(50% - 25px);
    }
    .E{
        background-color: orange;
        position: relative;
        top: 10px;
        left: 20px;
        float: left;
        margin-right: 5px;
    }
    .e{
        background-color: red;
        position: absolute;
        right: 50%;
        bottom: 0px;
    }
    .G{
        background-color:violet;
        position: relative;
        top: 10px;
        left: 20px;
        float: left;
        margin-right: 5px;
        
    }
    .g{
        background-color: red;
        position: absolute;
        right: -25px;
        bottom: calc(50% - 25px);
    }
    .B{
        background-color: blue;
        position: relative;
        top: 10px;
        left: 20px;
        clear: both;
        float: left;
        margin-right: 5px;
    }
    .b{
        background-color: red;
        position: absolute;
        right: 0px;
        bottom: 0px;
    }
    .D{
        background-color: yellow;
        position: relative;
        top: 10px;
        left: 20px;
        float: left;
        margin-right: 5px;
        
    }
    .d{
        background-color: red;
        position: absolute;
        top: calc(50% - 25px);
    }   
       
    
    .F{
        background-color: aqua;
        position: relative;
        top: 10px;
        left: 20px;
        float: left;
        margin-right: 5px;    
    }
    .f{
        background-color: red;
        position: absolute;
        right: 0px;
        bottom: calc(50% - 25px); 
    }
    
    .H{
        background-color: darksalmon;
        position: relative;
        top: 10px;
        left: 20px;
        float: left;
        margin-right: 5px;
    }
    .h{
        background-color: red;
        position: absolute;
        right: calc(50% - 25px);
        bottom: -25px;
    }
    




    
    
    </style>
</head>
<body>
    <div class="A h-300 w-500">
        <div class="a w-h-50"></div>
    </div>
    <div class="C h-300 w-500">
            <div class="c w-h-50"></div>
    </div>
    <div class="E w-500 h-300">
            <div class="e w-h-50"></div>
    </div>
    <div class="G w-500 h-300">
            <div class="g w-h-50"></div>
    </div>
    <div class="B h-300 w-500">
        <div class="b w-h-50"></div>
    </div>
    
    <div class="D h-300 w-500">
        <div class="d w-h-50"></div>
    </div>
    
    <div class="F h-300 w-500">
        <div class="f w-h-50"></div>
    </div>
   
    <div class="H h-300 w-500">
        <div class="h w-h-50"></div>
    </div>
</body>
</html>
