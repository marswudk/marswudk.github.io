<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
    .tomato{
        width: 350px;
        border: 5px dashed brown;
        position: absolute;
        top: calc(50% - 264px);
        left: calc(50% - 175px);
    }
    .box{
        width: 400px;
        height: 600px;
        border: 10px solid red;
        position: absolute;
        left: 10px;
        float: left;
    }
    .video{
        width: 350px;
        position: absolute;
        left: calc(50% - 175px);
        float: left;
        margin-left: 30px;
        border: 10px solid violet;
    }
    .bg{
       
        background-image: url('https://static.farmtario.com/wp-content/uploads/2018/07/15102944/soybeansscenic-jgreig.jpg');
        background-size: cover;
        background-position: center;
        
        

    }
    
    
    </style>
</head>
<body>
    <div class="box">
        <img class="tomato" src="https://live.staticflickr.com/6119/6276036025_15bfc1a5d8_b.jpg" alt="玉女小番茄">
    </div>
    <div class="bg"></div>
    <iframe class="video" width="560" height="315" src="https://www.youtube.com/embed/Y2ge3KrdeWs" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    
</body>
</html>
