<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>終極密碼</title>
    <style>
    #card{
        max-width: 400px;
        margin: 0 auto;
    }
    #reset_btn{
        display: none;

    }
    #reset_btn.active{
        display: block;
    }
    
    </style>
</head>
<body>
    <div id="card">
        <h1>終極密碼0~100</h1>
        <p id="text">數字已準備好了，請開始遊戲</p>
        <input id="guess_number" type="number" min="0" max="100">
        <button id="btn">送出</button>
        <button id="reset_btn">重新倒酒</button>
    </div>

    <script>
    var final_answer = Math.floor(Math.random()*101);  
    console.log("the answer is:", final_answer);
    var btn = document.querySelector('#btn');          
    var guess_round = 1;
    var text = document.querySelector('#text');
    var start_number = 0;
    var end_number = 100;
    var reset_btn = document.querySelector('#reset_btn');
                  
    btn.onclick = function(){        
        
        var guess_number = parseInt(document.querySelector('#guess_number').value);  
        console.log(typeof guess_number);
        
        if(final_answer === guess_number){
            // console.log("bingo!");
            text.textContent = `Bang!該你喝了! 你總共要喝${guess_round}杯`;
            reset_btn.classList.add('active');
            
        }
        else if(final_answer > guess_number){
            // console.log('too small');
            start_number = guess_number;
            text.textContent = `Larger! 範圍:${start_number} ~ ${end_number}`;
            guess_round++;
        }
        else if(final_answer < guess_number){
            // console.log('too big');
            end_number = guess_number;
            text.textContent = `Smaller ! 範圍:${start_number} ~ ${end_number}`;
            guess_round++;
        }
       
    }
    reset_btn.onclick = function(){
        // console.log('abc');
        final_answer = Math.floor(Math.random()*101);
        console.log("the answer is:", final_answer);
        guess_round = 1;
        start_number = 0;
        end_number = 100;
        document.querySelector('#guess_number').value = '';
        reset_btn.classList.remove('active');
    }
    
    
    </script>
</body>
</html>
