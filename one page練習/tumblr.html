    <style>
        * {
            padding: 0;
            margin: 0;
        }

        body {
            overflow: hidden;
            background-color: greenyellow;
        }

        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /*插入導覽列*/
        .nav {
            position: fixed;
            top: 50%;
            right: 0;
            z-index: 10;
        }

        .nav ul li {
            width: 10px;
            height: 10px;
            margin: 10px;
            background-color: #fff;
            box-shadow: 0px 0px 0px rgba(0, 0, 0, 0.5) inset;
            cursor: pointer;
            border-radius: 50%;
            list-style: none;

        }

        .nav ul li.active {
            background-color: darkcyan;
        }

        /*每頁顯示的圖片*/
        .p01 {
            /* background-image: url(https://placeimg.com/1000/1000/animals); */
            background-color: black;
            background-size: cover;
            z-index: 5;
        }

        .p02 {
            /* background-image: url(https://placeimg.com/1000/1000/arch); */
            background-color: red;
            background-size: cover;
            z-index: 4;
        }

        .p03 {
            /* background-image: url(https://placeimg.com/1000/1000/nature); */
            background-color: yellow;
            background-size: cover;
            z-index: 3;
        }

        .p04 {
            /* background-image: url(https://placeimg.com/1000/1000/people); */
            background-color: green;
            background-size: cover;
            z-index: 2;
        }

        .p05 {
            /* background-image: url(https://placeimg.com/1000/1000/tech); */
            background-color: gray;
            background-size: cover;
            z-index: 1;
        }

        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            transition: 2s;
        }

        .remove {
            transform: translateY(-100%);
        }
    </style>
</head>

        var number_li = $('.nav li').length
        n = 1

        $(window).on('mousewheel', function (e) {
            // console.log(e.deltaY);
            if (e.deltaY == -1) {
                if (n < number_li) {
                    n++
                    $(`.page:nth-child(${n})`).addClass('remove')
                    $('.nav li').removeClass('active')
                    $(`.nav li:nth-child(${n})`).addClass('active')

                }
            } else {
                if (n > 1) {
                    n--
                    $(`.page:nth-child(${n + 1})`).removeClass('remove')
                    $('.nav li').removeClass('active')
                    $(`.nav li:nth-child(${n})`).addClass('active')

                }
            }
            console.log(n);
            

        })


        $('.nav li').click(function () {

            $('.nav li').removeClass('active')
            $(this).addClass('active')
            var index = $(".nav li").index(this);
            $(`.page:nth-child(${index+2})`).removeClass('remove')
            $(`.page:nth-child(${index+1})`).addClass('remove')
            
            console.log(index);
        })
