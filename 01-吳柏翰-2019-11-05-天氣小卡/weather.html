<style>
    .cards {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
    }

    .card {
        background-color: lightcoral;
        border: 1px solid gray;
        padding: 15px;
        margin: 10px;
        font-size: 20px;
        line-height: 30px;
        width: 18%;
        /* text-align: center; */
        color: white;
        position: relative;

    }

    .weather_img {
        width: 100px;
        height: 100px;
        position: absolute;
        right: 15px;
        top: 15px;
    }
</style>

<body>
    <div class="cards">

    <script>


        $.ajax({
            url: "https://opendata.cwb.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=CWB-B5282D9D-8FDD-40E9-AD48-B1DF3270465D",
            cache: false,
            success: function (res) {

                const cards = document.querySelector('.cards');
                const locations = res.records.location;
                // console.log(res);
                
                
                locations.forEach(location => {
                    const locationName = location.locationName;
                    const Wx = location.weatherElement[0].time[0].parameter.parameterName;
                    const Pop = location.weatherElement[1].time[0].parameter.parameterName;
                    const MinT = location.weatherElement[2].time[0].parameter.parameterName;
                    const MaxT = location.weatherElement[4].time[0].parameter.parameterName;
                    const Ci = location.weatherElement[3].time[0].parameter.parameterName;
                    const img_array =['./img/sunny.png','./img/cloudy.png','./img/rainy.png'];
                    const time = location.weatherElement[0].time[0]
                    Pop_number = parseInt(Pop); 
                    
                    console.log(time);
                    
                    var img;
                    if (Pop_number < 20) {
                        img = img_array[0];
                    } else if (Pop_number >= 50) {
                        img = img_array[2];
                    } else {
                        img = img_array[1];
                    }
                   console.log(Pop_number);
                   
                    cards.innerHTML +=
                        ` <div class="card">
                            <h1>${locationName}</h1>
                            <img class="weather_img" src= ${img} alt="">
                            <h2>${Wx}</h2>
                            <p>${Ci}</p>
                            <p>溫度:${MinT} ~ ${MaxT} 度C</p>
                            <p>降雨機率: ${Pop}%</p>
                            
                        </div>`


                });
                

            }
        });
