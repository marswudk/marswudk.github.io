<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
        }
        body{
            font-family: 標楷體;
        }

        #bluebarRoot {
            width: 100%;
            height: 42px;
            background-color: blue;
            margin-top: 0;
            padding: 8px 0 8px 100px;

        }

        #bluebarLeft {
            float: left;
        }

        #searching_bar {
            height: 30px;
            width: 300px;
            color: gray;
            background-color: white;
            float: left;
        }

        #icon {
            width: 30px;
            height: 30px;
            float: left;
            margin-right: 8px;

        }

        #magnifier {
            height: 30px;
            float: left;
            margin-left: 0;


        }

        #bluebarRight {
            height: 100%;            
            float: right;
            padding: 0 50px;           
            
        }


        #name {
            float: left;
            color: white;
            

        }

        #name_avatar {
            width: 30px;
            height: 30px;
            border-radius: 15px;
            float: left;
            background-image: url('https://images.unsplash.com/photo-1529778873920-4da4926a72c2?ixlib=rb-1.2.1&dpr=1&auto=format&fit=crop&w=416&h=312&q=60');
            background-position: center;
            background-size: cover;
        }

        #name_btn {
            height: 100%;
            float: left;
            padding: 3px;
        }

        #homepage {
            height: 100%;
            float: left;
            padding: 3px;
            color: white;
            border-left: 1px solid lightgray;
        }

        #creat {
            height: 100%;
            float: left;
            padding: 3px;
            color: white;
            border-left: 1px solid lightgray;
        }
        #notification_bar{           
            float: left;
            border-left: 1px solid lightgray;
            padding: 3px;

        }
        #friends_request{
            height: 100%;
            margin-right: 3px;
            color: white;
            float: left;
        }
        #message{            
            height: 100%;
            color: white;
            margin-right: 3px;
            float: left;
        }
        #notification{            
            height: 100%;
            color: white;
            float: left;

        }
        #setting_bar{            
            float: left;
            border-left: 1px solid lightgray;
            padding: 3px;
        }
        #help{           
            height: 100%;
            color: white;
            float: left;
            margin-right: 3px;
        }
        #more{
            height: 100%;
            color: white;
            float: left;
        }


        #header {
            width: 70%;
            height: 358px;
            background-color: brown;
            position: relative;
            margin: 0 auto;
        }

        #coverborder {
            width: 100%;
            height: 313px;
            background-color: crimson;
            position: absolute;
            top: 0;
            background-image: url('https://static.independent.co.uk/s3fs-public/thumbnails/image/2019/03/20/10/waterfall.jpg');
            background-size: cover;
            background-position: bottom;


        }

        #function_menuLeft {
            width: 135px;
            height: 40px;
            background-color: white;
            position: absolute;
            right: 200px;
            bottom: 30px;
            float: left;
            padding: 10px 5px;
        }

        #pencil {
            height: 20px;
            float: left;

        }

        #function_menuRight {
            width: 140px;
            height: 40px;
            background-color: white;
            position: absolute;
            right: 50px;
            bottom: 30px;
        }

        #function_menuRight_list {
            width: 35px;
            height: 40px;
            background-color: white;
            float: left;
            padding: 5px;
        }

        #list {
            width: 25px;
            float: left;
            margin-top: 5px;
        }

        #function_lineRight_record {
            width: 70px;
            height: 100%;
            background-color: white;
            color: black;
            float: left;
            padding: 10px 0;
            margin-right: 1px;
        }

        #function_lineRight_pulldown {
            width: 33px;
            height: 100%;
            background-color: white;
            float: left;
            margin-right: 0px;
            border-left: thin solid lightgray;
            padding: 3px;

        }

        #pull_down {
            width: 24px;
            float: left;
            margin-right: 0;
            margin-top: 5px;

        }

        #guide_line {
            width: 100%;
            height: 45px;
            background-color: white;
            position: absolute;
            bottom: 0;
            border: 1px solid gray;
        }

        .timeline_btn {
            width: 100px;
            height: 100%;
            background-color: white;
            color: lightgray;
            float: left;
            margin-left: 250px;
            padding: 12px 15px;
            border-left: thin solid lightgray;


        }

        .about_btn {
            width: 80px;
            height: 100%;
            background-color: white;
            color: lightgray;
            float: left;
            padding: 12px 15px;
            border-left: thin solid lightgray;

        }

        .friends_btn {
            width: 80px;
            height: 100%;
            background-color: white;
            color: lightgray;
            float: left;
            padding: 12px 15px;
            border-left: thin solid lightgray;

        }

        .photo_btn {
            width: 80px;
            height: 100%;
            background-color: white;
            color: lightgray;
            float: left;
            padding: 12px 15px;
            border-left: thin solid lightgray;

        }

        .archive_btn {
            width: 80px;
            height: 100%;
            background-color: white;
            color: lightgray;
            float: left;
            padding: 12px 15px;
            border-left: thin solid lightgray;
        }

        .more_btn {
            width: 80px;
            height: 100%;
            background-color: white;
            color: lightgray;
            float: left;
            padding: 12px 15px;
            border-left: thin solid lightgray;
            border-right: thin solid lightgray;

        }

        #avatar {
            width: 160px;
            height: 160px;
            background-color: green;
            z-index: 1;
            position: absolute;
            bottom: 20px;
            left: 35px;
            border-radius: 80px;
            background-image: url('https://images.unsplash.com/photo-1529778873920-4da4926a72c2?ixlib=rb-1.2.1&dpr=1&auto=format&fit=crop&w=416&h=312&q=60');
            background-size: cover;
            background-position: center;
            border: 5px solid white;
        }

        .clear {
            clear: both;
        }
    </style>
</head>
