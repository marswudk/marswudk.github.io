<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>三選一</title>
    <style>
    #boxA{
        height: 200px;
        width: 800px;
        color: black;
        background-color: green;
        float: left;      
    }
    #boxB{
        height: 350px;
        width: 200px;
        color: black;
        background-color: red;
        float: right;      
    }
    #boxC{
        height: 200px;
        width: 800px;
        color: black;
        background-color: blue;
        clear: both;      
    }
    
    </style>
</head>
<body>
    <div id="boxA">A</div>
    <div id="boxB">B</div>
    <div id="boxC">C</div>    
    
</body>
</html>
